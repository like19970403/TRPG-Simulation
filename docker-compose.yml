services:
  app:
    build: .
    ports:
      - "${APP_HOST_PORT:-0.0.0.0:3000}:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://trpg:trpg_secret@postgres:5432/trpg_simulation?sslmode=disable  # 容器內部連線，不受 PG_HOST_PORT 影響
      - LOG_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-min-32chars}
      - JWT_ACCESS_TOKEN_TTL=${JWT_ACCESS_TOKEN_TTL:-900}
      - JWT_REFRESH_TOKEN_TTL=${JWT_REFRESH_TOKEN_TTL:-604800}
      - BCRYPT_COST=12
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - UPLOAD_DIR=/app/uploads
      - STATIC_DIR=/app/static
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - MAX_JSON_BODY_SIZE=${MAX_JSON_BODY_SIZE:-1048576}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - trpg-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trpg
      POSTGRES_PASSWORD: trpg_secret
      POSTGRES_DB: trpg_simulation
    ports:
      - "${PG_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trpg -d trpg_simulation"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trpg-net

networks:
  trpg-net:
    driver: bridge

volumes:
  pgdata:
  uploads:
